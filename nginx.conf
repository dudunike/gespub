# Nginx — Proxy reverso para GesPub.ai na VPS
# Copie para: /etc/nginx/sites-available/gespub
# Ative com: sudo ln -s /etc/nginx/sites-available/gespub /etc/nginx/sites-enabled/
# SSL com:   sudo certbot --nginx -d gespub.online -d www.gespub.online

server {
    listen 80;
    server_name gespub.online www.gespub.online;
    return 301 https://gespub.online$request_uri;
}

server {
    listen 443 ssl http2;
    server_name gespub.online www.gespub.online;

    # SSL (gerado pelo Certbot)
    ssl_certificate     /etc/letsencrypt/live/gespub.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gespub.online/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Redireciona www para não-www
    if ($host = 'www.gespub.online') {
        return 301 https://gespub.online$request_uri;
    }

    # Tamanho máximo de upload (fotos de perfil)
    client_max_body_size 5M;

    # Proxy para o servidor Node.js
    location / {
        proxy_pass         http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # Cache de assets estáticos do frontend
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        proxy_pass http://localhost:3000;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;
}
